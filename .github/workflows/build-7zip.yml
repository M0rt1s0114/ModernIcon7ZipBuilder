name: Auto Build 7-Zip x64 (Original + Custom) with Installers

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-7zip.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Get latest 7-Zip version from ip7z/7zip tags
        id: version
        shell: pwsh
        run: |
          $tag = gh api repos/ip7z/7zip/tags --jq '.[0].name' --method GET 2>$null
          if (-not $tag) { throw "无法从 ip7z/7zip 获取最新 tag" }
          Write-Host "Latest tag: $tag"
          $cleanTag = $tag -replace '^v', ''
          $parts = $cleanTag -split '\.'
          if ($parts.Count -ne 2) { throw "Tag 格式不是 X.Y: $tag" }
          $major = $parts[0]
          $minor = $parts[1]
          $version = "$major.$minor"
          $versionDigits = "$major$minor"
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "VERSION_DIGITS=$versionDigits" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Version: $versionDigits (from $tag)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if this version already built
        shell: pwsh
        run: |
          $versionDigits = $env:VERSION_DIGITS
          $releases = gh release list --json name --limit 100 --repo $env:GITHUB_REPOSITORY 2>$null
          if ($releases) {
            $built = $releases | ConvertFrom-Json | Where-Object { $_.name -like "7zip-$versionDigits-*" }
            if ($built) {
              Write-Host "Release for version $versionDigits already exists. Skipping build."
              exit 0
            }
          }
          Write-Host "No existing release for version $versionDigits. Proceeding."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine next build tag (YYHN)
        id: buildtag
        shell: pwsh
        run: |
          $yearSuffix = (Get-Date).Year % 100
          $yearStr = $yearSuffix.ToString("00")
          $existingTags = gh release list --json tagName --limit 100 --repo $env:GITHUB_REPOSITORY 2>$null
          $maxN = 0
          if ($existingTags) {
            $tags = ($existingTags | ConvertFrom-Json).tagName
            $pattern = "^$yearStr`H(\d+)$"
            foreach ($t in $tags) {
              if ($t -match $pattern) {
                $n = [int]$matches[1]
                if ($n -gt $maxN) { $maxN = $n }
              }
            }
          }
          $nextN = $maxN + 1
          $buildTag = "$yearStr`H$nextN"
          Write-Host "Build tag: $buildTag"
          "BUILD_TAG=$buildTag" | Out-File -FilePath $env:GITHUB_ENV -Append
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Find Visual Studio vcvarsall.bat
        id: find_vs
        shell: pwsh
        run: |
          $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vsWhere)) { throw "vswhere not found" }
          $vsPath = & $vsWhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsPath) { throw "No suitable Visual Studio installation found" }
          $vcvars = Join-Path $vsPath "VC\Auxiliary\Build\vcvarsall.bat"
          "VCVARS=$vcvars" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Found vcvarsall.bat at: $vcvars"

      - name: Clone 7-Zip source from git (original & custom)
        shell: pwsh
        run: |
          $tag = gh api repos/ip7z/7zip/tags --jq '.[0].name' --method GET 2>$null
          if (-not $tag) { throw "无法获取最新 tag 用于克隆" }
          $orig = "${{ runner.temp }}\src_orig"
          $custom = "${{ runner.temp }}\src_custom"
          git clone -b $tag --depth 1 https://github.com/ip7z/7zip.git $orig
          git clone -b $tag --depth 1 https://github.com/ip7z/7zip.git $custom
          if (-not (Test-Path "$orig\CPP\7zip")) { throw "源码目录结构与预期不符" }
          Write-Host "Source directories ready."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Replace resources in custom build
        shell: pwsh
        run: |
          $script = Join-Path $env:GITHUB_WORKSPACE "scripts\replace-resources.ps1"
          $resDir = Join-Path $env:GITHUB_WORKSPACE "resources"
          if (Test-Path $script) {
            & $script -BuildDirectory "${{ runner.temp }}\src_custom" -ResourceDir $resDir
          } else {
            throw "替换脚本 scripts\replace-resources.ps1 不存在"
          }

      - name: Build all targets (original)
        shell: cmd
        working-directory: ${{ runner.temp }}\src_orig\CPP\7zip
        run: |
          call "${{ env.VCVARS }}" x64
          nmake NEW_COMPILER=1 MY_CPU=AMD64
          if %ERRORLEVEL% neq 0 exit /b %ERRORLEVEL%
          rem 编译安装/卸载工具（如果存在）
          if exist "..\..\C\Util\7zipInstall" (
            cd ..\..\C\Util\7zipInstall
            nmake NEW_COMPILER=1 MY_CPU=AMD64
            cd ..\..\..\CPP\7zip
          )
          if exist "..\..\C\Util\7zipUninstall" (
            cd ..\..\C\Util\7zipUninstall
            nmake NEW_COMPILER=1 MY_CPU=AMD64
            cd ..\..\..\CPP\7zip
          )

      - name: Build all targets (custom)
        shell: cmd
        working-directory: ${{ runner.temp }}\src_custom\CPP\7zip
        run: |
          call "${{ env.VCVARS }}" x64
          nmake NEW_COMPILER=1 MY_CPU=AMD64
          if %ERRORLEVEL% neq 0 exit /b %ERRORLEVEL%
          if exist "..\..\C\Util\7zipInstall" (
            cd ..\..\C\Util\7zipInstall
            nmake NEW_COMPILER=1 MY_CPU=AMD64
            cd ..\..\..\CPP\7zip
          )
          if exist "..\..\C\Util\7zipUninstall" (
            cd ..\..\C\Util\7zipUninstall
            nmake NEW_COMPILER=1 MY_CPU=AMD64
            cd ..\..\..\CPP\7zip
          )

      - name: Prepare output directories and collect files
        shell: pwsh
        run: |
          $origSrc = "${{ runner.temp }}\src_orig"
          $custSrc = "${{ runner.temp }}\src_custom"
          $tmp = "${{ runner.temp }}\tmp_out"
          $origOut = "$tmp\orig"
          $custOut = "$tmp\cust"
          $origGreen = "$tmp\green_orig"
          $custGreen = "$tmp\green_cust"
          New-Item -ItemType Directory -Force -Path $origOut, $custOut, $origGreen, $custGreen | Out-Null

          function Collect-BuildOutput($srcRoot, $destDir) {
            $base = "$srcRoot\CPP\7zip"
            # 核心文件（依照您的脚本）
            Copy-Item "$base\Bundles\Format7zF\x64\7z.dll" $destDir -ErrorAction Stop
            Copy-Item "$base\UI\Console\x64\7z.exe" $destDir -ErrorAction Stop
            Copy-Item "$base\UI\FileManager\x64\7zFM.exe" $destDir -ErrorAction Stop
            Copy-Item "$base\UI\GUI\x64\7zG.exe" $destDir -ErrorAction Stop
            Copy-Item "$base\Bundles\SFXWin\x64\7z.sfx" $destDir -ErrorAction Stop
            Copy-Item "$base\Bundles\SFXCon\x64\7zCon.sfx" $destDir -ErrorAction Stop
            Copy-Item "$base\UI\Explorer\x64\7-zip.dll" $destDir -ErrorAction Stop
            if (Test-Path "$base\UI\Explorer\x86\7-zip.dll") {
              Copy-Item "$base\UI\Explorer\x86\7-zip.dll" "$destDir\7-zip32.dll" -ErrorAction SilentlyContinue
            }
            # 安装/卸载工具
            $uninst = "$srcRoot\C\Util\7zipUninstall\x64\7zipUninstall.exe"
            if (Test-Path $uninst) { Copy-Item $uninst "$destDir\Uninstall.exe" -ErrorAction SilentlyContinue }
            $install = "$srcRoot\C\Util\7zipInstall\x64\7zipInstall.exe"
            if (Test-Path $install) { Copy-Item $install "$destDir\7zipInstall.exe" -ErrorAction SilentlyContinue }
          }

          Collect-BuildOutput $origSrc $origOut
          Collect-BuildOutput $custSrc $custOut

          # 下载官方安装包提取附加文件
          $officialExe = "https://www.7-zip.org/a/7z$env:VERSION_DIGITS-x64.exe"
          $officialDest = "$tmp\official.exe"
          Write-Host "Downloading official installer: $officialExe"
          Invoke-WebRequest -Uri $officialExe -OutFile $officialDest -ErrorAction Stop
          $officialExtract = "$tmp\official_ext"
          & "$origOut\7z.exe" x $officialDest -o"$officialExtract" -y | Out-Null

          # 拷贝官方文本文件和语言文件到两个版本
          foreach ($outDir in @($origOut, $custOut)) {
            Copy-Item "$officialExtract\History.txt" $outDir -ErrorAction SilentlyContinue
            Copy-Item "$officialExtract\License.txt" $outDir -ErrorAction SilentlyContinue
            Copy-Item "$officialExtract\readme.txt" $outDir -ErrorAction SilentlyContinue
            Copy-Item "$officialExtract\7-zip.chm" $outDir -ErrorAction SilentlyContinue
            Copy-Item "$officialExtract\descript.ion" $outDir -ErrorAction SilentlyContinue
            if (Test-Path "$officialExtract\Lang") {
              Copy-Item -Recurse -Force "$officialExtract\Lang\*" "$outDir\Lang\" -ErrorAction SilentlyContinue
            } else {
              New-Item -ItemType Directory -Force -Path "$outDir\Lang" | Out-Null
            }
          }

          # 制作绿色 ZIP（不包含安装/卸载程序）
          function Make-GreenZip($builtDir, $greenDir, $zipPath) {
            Copy-Item -Recurse -Force "$builtDir\*" $greenDir -ErrorAction Stop
            # 移除安装/卸载程序（绿色版不需要）
            Remove-Item "$greenDir\Uninstall.exe" -Force -ErrorAction SilentlyContinue
            Remove-Item "$greenDir\7zipInstall.exe" -Force -ErrorAction SilentlyContinue
            Compress-Archive -Path "$greenDir\*" -DestinationPath $zipPath -Force
          }
          $origZip = "${{ runner.temp }}\7z-orig-$env:VERSION-x64.zip"
          $custZip = "${{ runner.temp }}\7z-custom-$env:VERSION-x64.zip"
          Make-GreenZip $origOut $origGreen $origZip
          Make-GreenZip $custOut $custGreen $custZip
          "ORIG_GREEN_ZIP=$origZip" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CUSTOM_GREEN_ZIP=$custZip" | Out-File -FilePath $env:GITHUB_ENV -Append
          "ORIG_BUILT_DIR=$origOut" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CUST_BUILT_DIR=$custOut" | Out-File -FilePath $env:GITHUB_ENV -Append
          "OFFICIAL_DIR=$officialExtract" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create installers
        shell: pwsh
        run: |
          $origBuilt = $env:ORIG_BUILT_DIR
          $custBuilt = $env:CUST_BUILT_DIR
          $tmp = "${{ runner.temp }}\installers"
          New-Item -ItemType Directory -Force -Path $tmp | Out-Null

          function Build-Installer($builtDir, $outputName) {
            $packDir = Join-Path $tmp $outputName
            Copy-Item -Recurse -Force "$builtDir\*" $packDir -ErrorAction Stop
            # 选择安装 stub
            $installStub = ""
            if (Test-Path "$packDir\7zipInstall.exe") {
              $installStub = "$packDir\7zipInstall.exe"
            } elseif (Test-Path "$packDir\7z.sfx") {
              $installStub = "$packDir\7z.sfx"
            } else {
              throw "未找到安装程序启动模块"
            }
            # 制作自解压安装包
            $archive = "$tmp\$outputName.7z"
            & "$packDir\7z.exe" a -mx=9 $archive "$packDir\*" -r -x!"7zipInstall.exe" -x!"7z.sfx" -x!"Uninstall.exe" | Out-Null
            $installerExe = Join-Path $tmp "$outputName.exe"
            cmd /c copy /b "$installStub" + "$archive" "$installerExe" | Out-Null
            Write-Host "Installer created: $installerExe"
            return $installerExe
          }

          $origInstaller = Build-Installer $origBuilt "7z-setup-orig-$env:VERSION-x64"
          $custInstaller = Build-Installer $custBuilt "7z-setup-custom-$env:VERSION-x64"
          "ORIG_INSTALLER=$origInstaller" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CUSTOM_INSTALLER=$custInstaller" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.BUILD_TAG }}
          name: 7zip-${{ env.VERSION_DIGITS }}-${{ env.BUILD_TAG }}
          body: |
            ## 7-Zip ${{ env.VERSION }} (构建 ${{ env.BUILD_TAG }})

            自动构建自 [7-Zip 官方源码](https://github.com/ip7z/7zip)。

            ### 文件说明
            - **原始版本（绿色便携）**：`7z-orig-${{ env.VERSION }}-x64.zip`
            - **原始版本（安装包）**：`7z-setup-orig-${{ env.VERSION }}-x64.exe`
            - **定制版本（绿色便携）**：`7z-custom-${{ env.VERSION }}-x64.zip` （替换了文件关联图标、工具栏贴图等）
            - **定制版本（安装包）**：`7z-setup-custom-${{ env.VERSION }}-x64.exe`

            > ⚙️ 本仓库仅提供自动编译与资源替换，源码版权归属 7-Zip 原作者 Igor Pavlov。
          files: |
            ${{ env.ORIG_GREEN_ZIP }}
            ${{ env.CUSTOM_GREEN_ZIP }}
            ${{ env.ORIG_INSTALLER }}
            ${{ env.CUSTOM_INSTALLER }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
