name: Auto Build 7-Zip x64 (Green ZIP only)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-7zip.yml'

permissions:
  contents: write

jobs:
  # ---------- 版本检查 ----------
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_digits: ${{ steps.version.outputs.version_digits }}
      build_tag: ${{ steps.tag.outputs.build_tag }}
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: Get latest version from ip7z/7zip
        id: version
        shell: pwsh
        run: |
          $tag = gh api repos/ip7z/7zip/tags --jq '.[0].name' --method GET 2>$null
          if (-not $tag) { throw "无法获取最新 tag" }
          $clean = $tag -replace '^v',''
          $parts = $clean -split '\.'
          if ($parts.Count -ne 2) { throw "Tag 格式异常: $tag" }
          $digits = $parts[0] + $parts[1]
          $ver = "$($parts[0]).$($parts[1])"
          "version=$ver" >> $env:GITHUB_OUTPUT
          "version_digits=$digits" >> $env:GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if already built
        id: check
        shell: pwsh
        run: |
          $digits = '${{ steps.version.outputs.version_digits }}'
          $releases = gh release list --json name --limit 50 --repo ${{ github.repository }} 2>$null
          $skip = 'false'
          if ($releases) {
            $built = $releases | ConvertFrom-Json | Where-Object { $_.name -like "7zip-$digits-*" }
            if ($built) { $skip = 'true' }
          }
          "skip=$skip" >> $env:GITHUB_OUTPUT
          Write-Host "Skip: $skip"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine build tag
        id: tag
        if: steps.check.outputs.skip != 'true'
        shell: pwsh
        run: |
          $year = (Get-Date).Year % 100
          $prefix = "{0:D2}H" -f $year
          $tags = gh release list --json tagName --limit 100 --repo ${{ github.repository }} 2>$null
          $max = 0
          if ($tags) {
            ($tags | ConvertFrom-Json).tagName | ForEach-Object {
              if ($_ -match "^$prefix(\d+)$") { $n = [int]$matches[1]; if ($n -gt $max) { $max = $n } }
            }
          }
          $next = $max + 1
          $buildTag = "$prefix$next"
          "build_tag=$buildTag" >> $env:GITHUB_OUTPUT
          Write-Host "Build tag: $buildTag"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------- 矩阵编译 ----------
  build:
    needs: setup
    if: needs.setup.outputs.skip != 'true'
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        flavor: [orig, custom]
    env:
      VERSION: ${{ needs.setup.outputs.version }}
      VERSION_DIGITS: ${{ needs.setup.outputs.version_digits }}
      BUILD_TAG: ${{ needs.setup.outputs.build_tag }}
    steps:
      - name: Checkout repository (for resources)
        uses: actions/checkout@v7

      - name: Find Visual Studio vcvarsall.bat
        shell: pwsh
        run: |
          $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vsWhere)) { throw "vswhere not found" }
          $vsPath = & $vsWhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsPath) { throw "No suitable VS installation" }
          $vcvars = Join-Path $vsPath "VC\Auxiliary\Build\vcvarsall.bat"
          "VCVARS=$vcvars" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Clone source
        shell: pwsh
        run: |
          $tag = gh api repos/ip7z/7zip/tags --jq '.[0].name' --method GET 2>$null
          if (-not $tag) { throw "无法获取 tag 用于克隆" }
          $src = "${{ runner.temp }}\src"
          git clone -b $tag --depth 1 https://github.com/ip7z/7zip.git $src
          if (-not (Test-Path "$src\CPP\7zip")) { throw "源码结构错误" }
          "SRC_DIR=$src" | Out-File -FilePath $env:GITHUB_ENV -Append
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Replace resources (custom only)
        if: matrix.flavor == 'custom'
        shell: pwsh
        run: |
          $script = Join-Path $env:GITHUB_WORKSPACE "scripts\replace-resources.ps1"
          $resDir = Join-Path $env:GITHUB_WORKSPACE "resources"
          & $script -BuildDirectory $env:SRC_DIR -ResourceDir $resDir

      - name: Build all targets
        shell: cmd
        working-directory: ${{ env.SRC_DIR }}\CPP\7zip
        run: |
          call "${{ env.VCVARS }}" x64
          nmake NEW_COMPILER=1 MY_CPU=AMD64
          if %ERRORLEVEL% neq 0 exit /b %ERRORLEVEL%
          if exist "..\..\C\Util\7zipInstall" (
            cd ..\..\C\Util\7zipInstall
            nmake NEW_COMPILER=1 MY_CPU=AMD64
            cd ..\..\..\CPP\7zip
          )
          if exist "..\..\C\Util\7zipUninstall" (
            cd ..\..\C\Util\7zipUninstall
            nmake NEW_COMPILER=1 MY_CPU=AMD64
            cd ..\..\..\CPP\7zip
          )

      - name: Collect and package green ZIP
        shell: pwsh
        run: |
          $src = $env:SRC_DIR
          $base = "$src\CPP\7zip"
          $tmp = "${{ runner.temp }}\pkg"
          $green = "$tmp\green"
          New-Item -ItemType Directory -Force -Path $green | Out-Null

          # 拷贝核心编译产物 (按照您的脚本路径)
          Copy-Item "$base\Bundles\Format7zF\x64\7z.dll" $green -ErrorAction Stop
          Copy-Item "$base\UI\Console\x64\7z.exe" $green -ErrorAction Stop
          Copy-Item "$base\UI\FileManager\x64\7zFM.exe" $green -ErrorAction Stop
          Copy-Item "$base\UI\GUI\x64\7zG.exe" $green -ErrorAction Stop
          Copy-Item "$base\Bundles\SFXWin\x64\7z.sfx" $green -ErrorAction Stop
          Copy-Item "$base\Bundles\SFXCon\x64\7zCon.sfx" $green -ErrorAction Stop
          Copy-Item "$base\UI\Explorer\x64\7-zip.dll" $green -ErrorAction Stop
          if (Test-Path "$base\UI\Explorer\x86\7-zip.dll") {
            Copy-Item "$base\UI\Explorer\x86\7-zip.dll" "$green\7-zip32.dll" -ErrorAction SilentlyContinue
          }
          # 安装/卸载工具不包含在绿色版中

          # 下载官方安装包以提取帮助文件、语言包等
          $officialUrl = "https://www.7-zip.org/a/7z$env:VERSION_DIGITS-x64.exe"
          $officialDl = "$tmp\official.exe"
          Invoke-WebRequest -Uri $officialUrl -OutFile $officialDl -ErrorAction Stop
          $officialExt = "$tmp\official"
          & "$green\7z.exe" x $officialDl -o"$officialExt" -y | Out-Null

          Copy-Item "$officialExt\History.txt" $green -ErrorAction SilentlyContinue
          Copy-Item "$officialExt\License.txt" $green -ErrorAction SilentlyContinue
          Copy-Item "$officialExt\readme.txt" $green -ErrorAction SilentlyContinue
          Copy-Item "$officialExt\7-zip.chm" $green -ErrorAction SilentlyContinue
          Copy-Item "$officialExt\descript.ion" $green -ErrorAction SilentlyContinue
          if (Test-Path "$officialExt\Lang") {
            Copy-Item -Recurse -Force "$officialExt\Lang\*" "$green\Lang\" -ErrorAction SilentlyContinue
          } else {
            New-Item -ItemType Directory -Force -Path "$green\Lang" | Out-Null
          }

          # 打包为 ZIP
          $zipName = "7z-${{ matrix.flavor }}-$env:VERSION-x64.zip"
          $zipPath = Join-Path $tmp $zipName
          Compress-Archive -Path "$green\*" -DestinationPath $zipPath -Force
          Write-Host "Green ZIP created: $zipPath"

          # 移到上传目录
          $upload = "${{ runner.temp }}\upload"
          New-Item -ItemType Directory -Force -Path $upload | Out-Null
          Copy-Item $zipPath $upload
          "UPLOAD_DIR=$upload" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.flavor }}
          path: ${{ env.UPLOAD_DIR }}\*

  # ---------- 发布 ----------
  release:
    needs: [setup, build]
    if: needs.setup.outputs.skip != 'true' && success()
    runs-on: ubuntu-latest
    env:
      BUILD_TAG: ${{ needs.setup.outputs.build_tag }}
      VERSION: ${{ needs.setup.outputs.version }}
      VERSION_DIGITS: ${{ needs.setup.outputs.version_digits }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.BUILD_TAG }}
          name: 7zip-${{ env.VERSION_DIGITS }}-${{ env.BUILD_TAG }}
          body: |
            ## 7-Zip ${{ env.VERSION }} (构建 ${{ env.BUILD_TAG }})

            自动构建自 [7-Zip 官方源码](https://github.com/ip7z/7zip)。

            ### 文件说明
            - **原始版本（绿色便携）**：`7z-orig-${{ env.VERSION }}-x64.zip`
            - **定制版本（绿色便携）**：`7z-custom-${{ env.VERSION }}-x64.zip` （替换了文件关联图标、工具栏贴图等）

            > ⚙️ 本仓库仅提供自动编译与资源替换，源码版权归属 7-Zip 原作者 Igor Pavlov。
          files: |
            artifacts/build-orig/7z-*.zip
            artifacts/build-custom/7z-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
